# Fleet Manager only — listen on FLEET_PUBLIC_PORT (default 8993).
# Installed by deploy_hetzner.sh as /etc/nginx/sites-available/fleet-manager.
# Does not modify other Django app vhosts.

server {
    listen FLEET_PUBLIC_PORT_PLACEHOLDER;
    server_name SERVER_PLACEHOLDER;
    root REMOTE_DIR_PLACEHOLDER/frontend/dist;
    index index.html;
    client_max_body_size 32m;

    location /api/ {
        proxy_pass http://127.0.0.1:FLEET_GUNICORN_PORT_PLACEHOLDER;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:FLEET_GUNICORN_PORT_PLACEHOLDER;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:FLEET_GUNICORN_PORT_PLACEHOLDER;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
