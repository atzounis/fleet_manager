services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet_manager
    ports:
      - "${POSTGRES_HOST_PORT:-47291}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_manager"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-58163}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_HOST_PORT:-38472}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-41908}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/fleet-manager || true;
      exit 0;
      "

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/docker/entrypoint-web.sh"]
    env_file: .env
    environment:
      DEV_USE_SQLITE: "false"
      DEBUG: "false"
      DATABASE_URL: postgres://fleet:fleet@postgres:5432/fleet_manager
      REDIS_URL: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "${WEB_PORT:-52841}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/dashboard/stats/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A core worker --loglevel=info
    env_file: .env
    environment:
      DEV_USE_SQLITE: "false"
      DATABASE_URL: postgres://fleet:fleet@postgres:5432/fleet_manager
      REDIS_URL: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A core beat --loglevel=info
    env_file: .env
    environment:
      DEV_USE_SQLITE: "false"
      DATABASE_URL: postgres://fleet:fleet@postgres:5432/fleet_manager
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - celery-worker
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-61294}:80"
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
